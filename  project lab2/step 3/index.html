<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator with jQuery and Bootstrap</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <h1 class="mb-4">GPA Calculator</h1>
        <div id="result" class="alert d-none"></div>
        <form id="gpaForm">
            <div id="courses">
                <div class="course-row form-row align-items-end mb-3">
                    <div class="col">
                        <label class="sr-only">Course</label>
                        <input type="text" name="course[]" class="form-control" placeholder="Course name" required>
                    </div>
                    <div class="col-2">
                        <label class="sr-only">Credits</label>
                        <input type="number" name="credits[]" class="form-control" placeholder="Credits" min="1" required>
                    </div>
                    <div class="col-2">
                        <label class="sr-only">Grade</label>
                        <select name="grade[]" class="form-control">
                            <option value="4.0">A</option>
                            <option value="3.0">B</option>
                            <option value="2.0">C</option>
                            <option value="1.0">D</option>
                            <option value="0.0">F</option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <button type="button" class="btn btn-danger remove-course d-none">Remove</button>
                    </div>
                </div>
            </div>
            <button type="button" id="addCourse" class="btn btn-secondary mb-3">+ Add Course</button>
            <button type="submit" class="btn btn-primary">Calculate GPA</button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <script src="script.js" defer></script>
</body>
</html>
